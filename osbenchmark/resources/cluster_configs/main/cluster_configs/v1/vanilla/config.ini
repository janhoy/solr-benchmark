[variables]
clean_command = ./gradlew clean
# Solr build commands (assembles the distribution tarball)
build_command = ./gradlew assemble
system.build_command = ./gradlew assemble
# Solr artifact paths (tarballs are in solr/packaging/build/distributions/)
artifact_path_pattern = solr/packaging/build/distributions/*.tgz
system.artifact_path_pattern = solr/packaging/build/distributions/*.tgz
# Solr distribution URLs (Apache downloads - latest versions)
release_url = https://downloads.apache.org/solr/solr/{{VERSION}}/solr-{{VERSION}}.tgz

docker_image=solr
# major version of the JDK that is required for Solr
build.jdk = 11
# list of JDK major versions supported by Solr 9.x+ (requires separate JRE installation)
runtime.jdk = 11,17,21
runtime.jdk.bundled = false
